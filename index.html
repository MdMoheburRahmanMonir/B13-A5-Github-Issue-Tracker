<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- DaisyUi CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Google Font's Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="flex justify-center items-center h-[100vh]">
    <main class="w-1/4 flex items-center justify-center shadow shadow-lg rounded-lg ">
        <fieldset class="fieldset   rounded-box w-xs  p-4">
            <div class="text-center">
                <i class="fa-brands fa-github text-[80px] mb-1"></i>
                <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
                <p  class="text-[14px] text-gray-600 mb-1">Sign in to manage your issues</p>
            </div>
            <label class="label  text-black font-bold">Username</label>
            <input id="emailBox" type="email" class="input rounded-xl" placeholder="Email" />
            <p class="text-blue-600">Default: admin</p>

            <label class="label text-black font-bold">Password</label>
            <input id="PassBox" type="password" class="input rounded-xl" placeholder="Password" />
            <p class="text-blue-600">Default: admin123</p>

            <button id="logInBtn" class="btn btn-primary mt-4 rounded-xl">Sign In</button>
            <div class="flex items-center my-4">
                <p class="flex-1 h-[1px] bg-black"></p> 
                <span class="px-4 font-bold text-black">OR</span> 
                <p class="flex-1 h-[1px] bg-black"></p>
            </div>
            <div class="text-center">
                <p class="mb-3 text-gray-600 text-[12px]">Demo Credentials:</p>
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </fieldset>
    </main>
    <script src="./script.js"></script>
</body> 
</html>
